name: Infra deployment

on:
    push: 
        branches: [main]
        paths:
            - 'infra/**'
            - '!infra/oidc/**'
            - '!infra/bootstrap/**'
            - '.github/workflows/terraform-apply.yaml'
    workflow_dispatch:
        inputs:
            environment:
                description: 'Environment to deploy'
                required: true
                type: choice
                options:
                    - dev
                    - prod
                default: dev

concurrency:
    group: terraform-infra-${{ github.event.inputs.environment || 'dev' }}
    cancel-in-progress: false

env:
    AWS_REGION: ${{ secrets.AWS_REGION }}
    ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
    deployment: 
        name: infra deployment (${{ github.event.inputs.environment || 'dev' }})
        runs-on: ubuntu-latest
        permissions: 
            id-token: write
            contents: read 
        
        steps:
            - name: checkout code 
              uses: actions/checkout@v4
            
            - name: AWS authentication
              uses: aws-actions/configure-aws-credentials@v4
              with: 
                role-to-assume: ${{ secrets.AWS_ROLE_ARN }}  
                aws-region: ${{ secrets.AWS_REGION }}
            
            - name: Setup Terraform 
              uses: hashicorp/setup-terraform@v3 
            
            - name: terraform init
              working-directory: infra 
              run: terraform init -backend-config="key=${{ env.ENVIRONMENT }}/terraform.tfstate"
            
            - name: terraform plan
              working-directory: infra 
              run: |
                terraform plan -input=false -lock-timeout=5m \
                  -var-file="${{ env.ENVIRONMENT }}.tfvars" \
                  -var='cluster_admin_arns=${{ secrets.CLUSTER_ADMIN_ARNS }}' \
                  -var='route53_zone_id=${{ secrets.ROUTE53_ZONE_ID }}' \
                  -out=tfplan
            
            - name: terraform apply 
              working-directory: infra 
              run: terraform apply -input=false -lock-timeout=5m tfplan
