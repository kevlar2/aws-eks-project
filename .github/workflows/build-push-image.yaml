name: Build and Scan Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '!app/VERSION'
      - '.github/workflows/build-push-image.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '!app/VERSION'
      - '.github/workflows/build-push-image.yaml'

env:
  IMAGE_NAME: 2048-game-app
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: 2048-eks-project-dev-2048-game-app

jobs:
  build-scan-and-push:
    runs-on: ubuntu-latest
    concurrency:
      group: build-push-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Determine semantic version
        id: version
        run: |
          VERSION_FILE="app/VERSION"

          # Initialise VERSION file if missing
          if [ ! -f "$VERSION_FILE" ] || [ ! -s "$VERSION_FILE" ]; then
            echo "0.1.0" > "$VERSION_FILE"
          fi

          CURRENT_VERSION=$(cat "$VERSION_FILE" | tr -d '[:space:]')

          # Validate current version format
          if [[ ! "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format '$CURRENT_VERSION' in $VERSION_FILE. Expected semver (e.g. 1.2.3)"
            exit 1
          fi

          # On PRs, use current version as-is (no bump)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "VERSION=${CURRENT_VERSION}" >> "$GITHUB_ENV"
            echo "version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Current version (PR, no bump): v${CURRENT_VERSION}"
            exit 0
          fi

          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          # Get commit subjects from the merge to determine bump type
          COMMITS=$(git log --format='%s' HEAD~1..HEAD -- app/ 2>/dev/null || true)

          if echo "$COMMITS" | grep -qE "BREAKING CHANGE|^feat!:"; then
            BUMP="major"
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            BUMP="patch"
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW_VERSION" > "$VERSION_FILE"

          echo "VERSION=${NEW_VERSION}" >> "$GITHUB_ENV"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP | v${CURRENT_VERSION} -> v${NEW_VERSION}"

      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        working-directory: app
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:v${{ env.VERSION }}-${{ env.SHORT_SHA }} \
            -t ${{ env.IMAGE_NAME }}:v${{ env.VERSION }} \
            .

      - name: Get image size
        id: image-size
        run: |
          SIZE_BYTES=$(docker image inspect ${{ env.IMAGE_NAME }}:v${{ env.VERSION }}-${{ env.SHORT_SHA }} --format='{{.Size}}')
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "size_mb=${SIZE_MB}" >> "$GITHUB_OUTPUT"
          echo "size_bytes=${SIZE_BYTES}" >> "$GITHUB_OUTPUT"

      # --- Trivy scans ---
      - name: Trivy scan - Docker image vulnerabilities (report)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:v${{ env.VERSION }}-${{ env.SHORT_SHA }}
          format: 'table'
          output: 'trivy-image-results.txt'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true

      - name: Trivy scan - Fail on CRITICAL vulnerabilities
        id: trivy-critical
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:v${{ env.VERSION }}-${{ env.SHORT_SHA }}
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
        continue-on-error: true

      - name: Trivy scan - Dockerfile misconfiguration
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'config'
          scan-ref: 'app/Dockerfile'
          format: 'table'
          output: 'trivy-config-results.txt'
          severity: 'CRITICAL,HIGH,MEDIUM'

      # --- Checkov scan ---
      - name: Checkov - Dockerfile scan
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          file: app/Dockerfile
          framework: dockerfile
          output_format: cli
          output_file_path: .
          soft_fail: true

      - name: Build and Scan Summary
        if: always()
        run: |
          echo "## Docker Build & Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Image Details" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image Name** | \`${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`v${{ env.VERSION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image Tag** | \`v${{ env.VERSION }}-${{ env.SHORT_SHA }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Full Reference** | \`${{ env.IMAGE_NAME }}:v${{ env.VERSION }}-${{ env.SHORT_SHA }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **ECR URI** | \`${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:v${{ env.VERSION }}-${{ env.SHORT_SHA }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Size** | ${{ steps.image-size.outputs.size_mb }} MB |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Trivy Vulnerability Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f trivy-image-results.txt ]; then
            cat trivy-image-results.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Scan did not produce results" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Trivy Dockerfile Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f trivy-config-results.txt ]; then
            cat trivy-config-results.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Scan did not produce results" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Checkov Dockerfile Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f results_cli.txt ]; then
            cat results_cli.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Scan did not produce results" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if critical vulnerabilities found
        if: steps.trivy-critical.outcome == 'failure'
        run: |
          echo "::error::Trivy found CRITICAL vulnerabilities in the image. Check the scan summary above."
          exit 1

      # --- Push image to ECR and commit version bump only on main branch pushes (not on PRs) ---
      - name: Install yq
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          YQ_VERSION: "v4.53.2"
          YQ_SHA256: "d56bf5c6819e8e696340c312bd70f849dc1678a7cda9c2ad63eebd906371d56b"
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64
          echo "${YQ_SHA256}  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq

      - name: Push image to ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          ECR_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          docker tag ${{ env.IMAGE_NAME }}:v${{ env.VERSION }}-${{ env.SHORT_SHA }} ${ECR_URI}:v${{ env.VERSION }}-${{ env.SHORT_SHA }}
          docker tag ${{ env.IMAGE_NAME }}:v${{ env.VERSION }}-${{ env.SHORT_SHA }} ${ECR_URI}:v${{ env.VERSION }}
          docker push ${ECR_URI}:v${{ env.VERSION }}-${{ env.SHORT_SHA }}
          docker push ${ECR_URI}:v${{ env.VERSION }}

      - name: Update image tag in values file
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          yq -i '.image.tag = "v${{ env.VERSION }}-${{ env.SHORT_SHA }}"' k8s/values/game-2048.yaml

      - name: Commit release artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/VERSION k8s/values/game-2048.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore(deploy): release v${{ env.VERSION }}-${{ env.SHORT_SHA }} [skip ci]"
          git pull --rebase origin main
          git push
