name: Destroy infrastructure 

on:
    workflow_dispatch:
        inputs:
            environment:
                description: 'Environment to destroy'
                required: true
                type: choice
                options:
                    - dev
                    - prod
                default: dev
            confirm_destroy:
                description: 'Type "destroy" to confirm infrastructure teardown'
                required: true
                type: string

concurrency:
    group: terraform-infra-${{ github.event.inputs.environment }}
    cancel-in-progress: false

env:
    AWS_REGION: ${{ secrets.AWS_REGION }}
    ENVIRONMENT: ${{ github.event.inputs.environment }}

jobs:
    destroy: 
        name: terraform destroy (${{ github.event.inputs.environment }})
        runs-on: ubuntu-latest
        permissions: 
            id-token: write
            contents: read 
        
        steps:
            - name: Validate confirmation
              if: github.event.inputs.confirm_destroy != 'destroy'
              run: |
                echo "::error::You must type 'destroy' to confirm. Got: '${{ github.event.inputs.confirm_destroy }}'"
                exit 1

            - name: checkout code 
              uses: actions/checkout@v4
            
            - name: AWS authentication
              uses: aws-actions/configure-aws-credentials@v4
              with: 
                role-to-assume: ${{ secrets.AWS_ROLE_ARN }}  
                aws-region: ${{ secrets.AWS_REGION }}
            
            - name: Setup Terraform 
              uses: hashicorp/setup-terraform@v3 
            
            - name: terraform destroy 
              working-directory: infra 
              run: |
                terraform init -backend-config="key=${{ env.ENVIRONMENT }}/terraform.tfstate"
                terraform plan -input=false -lock-timeout=5m \
                  -var-file="${{ env.ENVIRONMENT }}.tfvars" \
                  -var 'cluster_admin_arns=["${{ secrets.CLUSTER_ADMIN_ARNS }}"]' \
                  -var 'route53_zone_id=${{ secrets.ROUTE53_ZONE_ID }}' \
                  -destroy
                terraform destroy -input=false -lock-timeout=5m \
                  -var-file="${{ env.ENVIRONMENT }}.tfvars" \
                  -var 'cluster_admin_arns=["${{ secrets.CLUSTER_ADMIN_ARNS }}"]' \
                  -var 'route53_zone_id=${{ secrets.ROUTE53_ZONE_ID }}' \
                  -auto-approve 
            
            - name: Post-destroy cleanup
              run: |
                echo "Performing post-destroy cleanup tasks..."
                rm -rf infra/.terraform
                rm -rf infra/terraform.tfstate*
