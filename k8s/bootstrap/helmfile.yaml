helmDefaults:
  wait: true
  timeout: 600
  createNamespace: true
  atomic: true


repositories:
  - name: argo
    url: https://argoproj.github.io/argo-helm

  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx

releases:
  - name: argocd
    namespace: argocd
    chart: argo/argo-cd
    version: "5.51.6"
    values:
      - ../argocd/values-argocd.yaml

  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: "4.14.3"
    values:
      - ../values/nginx-ingress.yaml
