grafana:
  enabled: true
  defaultDashboardsTimezone: utc
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: tls-cert-issuer
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      external-dns.alpha.kubernetes.io/hostname: grafana.monitoring.kubevpro.bluebird-investments.co.uk
    hosts:
      - grafana.monitoring.kubevpro.bluebird-investments.co.uk
    tls:
      - hosts:
          - grafana.monitoring.kubevpro.bluebird-investments.co.uk
        secretName: grafana-tls
  
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      isDefault: false

prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec: {}

alertmanager:
  enabled: true

kubeEtcd:
  enabled: false
