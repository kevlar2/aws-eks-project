apiVersion: v1
kind: Service
metadata:
  name: {{ include "game-2048.fullname" . }}
  labels:
    {{- include "game-2048.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "game-2048.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
